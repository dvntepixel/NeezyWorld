<style>

:root{
  --ink:        #0a0a0a;
  --panel:      #1a1815;
  --paper:      #f2f0ec;
  --dim:        #9a9a94;
  --line:       rgba(242,240,236,.14);
  --accent:     #c8402c;

  --font-display: 'Archivo Black', 'Arial Black', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --container: 1280px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--font-mono);
  font-size:14px;
  line-height:1.6;
}
img{ display:block; max-width:100%; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; background:none; border:none; color:inherit; }
h1,h2,h3{ font-family:var(--font-display); text-transform:uppercase; line-height:1; }

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-family:var(--font-mono);
  font-weight:700;
  font-size:12px;
  letter-spacing:1.5px;
  padding:16px 30px;
  text-transform:uppercase;
  background:var(--paper);
  color:var(--ink);
  transition:background .2s ease, color .2s ease;
}
.btn:hover{ background:var(--accent); color:var(--paper); }
.btn--outline{ background:transparent; color:var(--paper); border:1px solid var(--paper); }
.btn--outline:hover{ background:var(--paper); color:var(--ink); }
.btn--full{ width:100%; }
.btn[disabled]{ opacity:.4; cursor:not-allowed; }
.btn[disabled]:hover{ background:var(--paper); color:var(--ink); }

/* ============ Nav ============ */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px clamp(20px,4vw,56px);
  border-bottom:1px solid var(--line);
}
.nav__logo img{ height:40px; }
.nav__links{ display:flex; align-items:center; gap:26px; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
.nav__links a:hover{ color:var(--dim); }
.nav__icons{ display:flex; align-items:center; gap:18px; }
.nav__icons button, .nav__icons a{ display:flex; position:relative; }
.cart-count{
  position:absolute; top:-7px; right:-9px;
  background:var(--accent); color:var(--paper);
  font-size:9px; font-weight:700;
  min-width:15px; height:15px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  padding:0 3px;
}
.nav__burger{ display:none; flex-direction:column; gap:5px; width:24px; }
.nav__burger span{ height:2px; background:var(--paper); width:100%; }

/* ============ Breadcrumb ============ */
.crumb{
  padding:18px clamp(20px,4vw,56px) 0;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--dim);
}
.crumb a:hover{ color:var(--paper); }

/* ============ Product layout ============ */
.product{
  max-width:var(--container);
  margin:0 auto;
  padding:30px 24px 100px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
}

/* Gallery */
.gallery__main{
  aspect-ratio:4/5;
  overflow:hidden;
  background:var(--panel);
  border:1px solid var(--line);
  margin-bottom:16px;
  position:relative;
}
.gallery__main img{ width:100%; height:100%; object-fit:cover; }
.gallery__badge{
  position:absolute;
  top:16px; left:16px;
  background:var(--accent);
  color:var(--paper);
  font-size:10px;
  font-weight:700;
  letter-spacing:1px;
  padding:6px 12px;
}
.gallery__thumbs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.gallery__thumbs button{
  aspect-ratio:4/5;
  overflow:hidden;
  background:var(--panel);
  border:1px solid var(--line);
  padding:0;
}
.gallery__thumbs button.active{ border-color:var(--paper); }
.gallery__thumbs img{ width:100%; height:100%; object-fit:cover; }

/* Info */
.info__collection{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:14px;
}
.info__collection a:hover{ text-decoration:underline; }
.info h1{
  font-size:clamp(28px,3.6vw,42px);
  margin-bottom:14px;
}
.info__price{
  display:flex;
  align-items:baseline;
  gap:12px;
  font-size:20px;
  font-weight:700;
  margin-bottom:26px;
}
.info__price .was{
  font-size:14px;
  font-weight:400;
  color:var(--dim);
  text-decoration:line-through;
}
.info__desc{
  color:var(--dim);
  font-size:14px;
  line-height:1.9;
  max-width:460px;
  margin-bottom:34px;
}

.info__block{ margin-bottom:30px; }
.info__label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:14px;
}
.info__label a{ color:var(--accent); }
.info__label a:hover{ text-decoration:underline; }

.sizes{ display:flex; gap:10px; flex-wrap:wrap; }
.sizes button{
  min-width:48px;
  padding:12px 14px;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
  transition:border-color .2s ease, background .2s ease;
}
.sizes button:hover{ border-color:var(--paper); }
.sizes button.selected{ background:var(--paper); color:var(--ink); border-color:var(--paper); }
.sizes button[disabled]{
  opacity:.3;
  text-decoration:line-through;
  cursor:not-allowed;
}

.qty{
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line);
}
.qty button{ width:42px; height:42px; font-size:16px; }
.qty button:hover{ background:var(--panel); }
.qty span{ width:40px; text-align:center; font-weight:700; }

.info__actions{
  display:flex;
  gap:14px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.info__actions .btn{ flex:1; min-width:200px; }

.info__note{
  font-size:12px;
  color:var(--dim);
  border-top:1px solid var(--line);
  padding-top:20px;
}

.stock-flag{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--accent);
  border:1px solid var(--accent);
  padding:6px 12px;
  margin-bottom:26px;
}

.toast{
  position:fixed;
  bottom:24px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--paper);
  color:var(--ink);
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
  padding:14px 24px;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  z-index:300;
  max-width:90vw;
  text-align:center;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ============ Related ============ */
.related{ max-width:var(--container); margin:0 auto; padding:0 24px 100px; }
.related__head{ font-size:clamp(22px,3vw,32px); margin-bottom:36px; }
.related__grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
.related__card{ display:block; }
.related__img{ aspect-ratio:4/5; overflow:hidden; background:var(--panel); border:1px solid var(--line); margin-bottom:12px; }
.related__img img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
.related__card:hover .related__img img{ transform:scale(1.05); }
.related__card h3{ font-family:var(--font-mono); font-size:12px; font-weight:700; text-transform:none; margin-bottom:4px; }
.related__card p{ font-size:11px; color:var(--dim); }

/* ============ Not found ============ */
.notfound{
  max-width:600px;
  margin:0 auto;
  padding:120px 24px;
  text-align:center;
}
.notfound h1{ font-size:clamp(32px,5vw,54px); margin-bottom:18px; }
.notfound p{ color:var(--dim); margin-bottom:30px; }

/* ============ Footer ============ */
.footer{ border-top:1px solid var(--line); padding:70px clamp(20px,4vw,50px) 30px; }
.footer__top{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:50px; max-width:var(--container); margin:0 auto 50px; }
.footer__logo img{ height:40px; opacity:.9; margin-bottom:16px; }
.footer__blurb{ color:var(--dim); font-size:12px; max-width:260px; }
.footer__cols{ display:flex; gap:60px; flex-wrap:wrap; }
.footer__cols h4{ font-size:11px; letter-spacing:1.5px; color:var(--paper); margin-bottom:16px; }
.footer__cols a{ display:block; font-size:12px; color:var(--dim); margin-bottom:10px; }
.footer__cols a:hover{ color:var(--paper); }
.footer__bottom{ text-align:center; font-size:10px; letter-spacing:1.5px; color:var(--dim); border-top:1px solid var(--line); padding-top:26px; }

/* ============ Responsive ============ */
@media (max-width:900px){
  .product{ grid-template-columns:1fr; gap:34px; }
  .related__grid{ grid-template-columns:1fr 1fr; }
}
@media (max-width:640px){
  .nav__links{
    position:fixed; top:0; right:0; height:100vh; width:min(78vw,300px);
    background:var(--ink); flex-direction:column; padding:100px 30px; gap:26px;
    transform:translateX(100%); transition:transform .3s ease; z-index:200;
    border-left:1px solid var(--line);
  }
  .nav__links.open{ transform:translateX(0); }
  .nav__burger{ display:flex; }
  .nav__logo img{ height:30px; }
  .info__actions .btn{ min-width:100%; }
}
</style>

<script>
/* ============================================================
   NEEZY — shared cart engine
   Inlined on every page, right after the product catalog block above,
   so each HTML file stays fully self-contained with no external JS files.

   Storage: sessionStorage — this means the cart is remembered
   as you navigate between pages, but clears automatically when
   the browser tab/window is closed (i.e. "until the session
   stops"). Swap STORAGE below to localStorage if you ever want
   it to persist across visits instead.
   ============================================================ */

(function () {
  const STORAGE = window.sessionStorage;
  const KEY = "neezy_cart_v1";

  function readCart() {
    try {
      const raw = STORAGE.getItem(KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function writeCart(items) {
    try {
      STORAGE.setItem(KEY, JSON.stringify(items));
    } catch (e) { /* storage full or unavailable — fail silently */ }
    updateBadges();
    document.dispatchEvent(new CustomEvent("neezy-cart-updated", { detail: { items } }));
  }

  function findIndex(items, slug, size) {
    return items.findIndex(i => i.slug === slug && i.size === (size || null));
  }

  function add(slug, size, qty) {
    qty = Math.max(1, qty || 1);
    const items = readCart();
    const idx = findIndex(items, slug, size || null);
    if (idx > -1) {
      items[idx].qty += qty;
    } else {
      items.push({ slug: slug, size: size || null, qty: qty });
    }
    writeCart(items);
    return items;
  }

  function removeAt(index) {
    const items = readCart();
    items.splice(index, 1);
    writeCart(items);
    return items;
  }

  function setQtyAt(index, qty) {
    const items = readCart();
    if (!items[index]) return items;
    items[index].qty = Math.max(1, qty || 1);
    writeCart(items);
    return items;
  }

  function clear() {
    writeCart([]);
  }

  function getItems() {
    return readCart();
  }

  function getCount() {
    return readCart().reduce((sum, i) => sum + i.qty, 0);
  }

  // Sum totals grouped by currency, since this catalog mixes MYR and PHP.
  function getSubtotals() {
    const items = readCart();
    const products = window.NEEZY_PRODUCTS || {};
    const totals = {};
    items.forEach(i => {
      const p = products[i.slug];
      if (!p || p.price == null) return;
      totals[p.currency] = (totals[p.currency] || 0) + p.price * i.qty;
    });
    return totals;
  }

  function formatMoney(currency, amount) {
    if (currency === "PHP") return "\u20b1" + Math.round(amount).toLocaleString();
    if (currency === "MYR") return "RM " + amount.toFixed(2);
    return currency + " " + amount.toFixed(2);
  }

  function updateBadges() {
    const count = getCount();
    document.querySelectorAll(".cart-count").forEach(el => {
      el.textContent = count;
      el.style.display = count > 0 ? "" : "none";
    });
  }

  window.NeezyCart = {
    add: add,
    removeAt: removeAt,
    setQtyAt: setQtyAt,
    clear: clear,
    getItems: getItems,
    getCount: getCount,
    getSubtotals: getSubtotals,
    formatMoney: formatMoney,
    updateBadges: updateBadges
  };

  document.addEventListener("DOMContentLoaded", updateBadges);
  // In case this script runs after DOMContentLoaded already fired
  if (document.readyState !== "loading") updateBadges();
})();

</script>
<script>
/* ============================================================
   Reads ?product=<slug> from the URL and renders that item
   from window.NEEZY_PRODUCTS (js/products.js).
   Example: product.html?product=concrete-hoodie
   ============================================================ */
const PRODUCTS = window.NEEZY_PRODUCTS || {};
const params = new URLSearchParams(window.location.search);
const slug = params.get('product');
const root = document.getElementById('productRoot');
const crumb = document.getElementById('crumb');

const fallbackSlug = Object.keys(PRODUCTS)[0];
const activeSlug = (slug && PRODUCTS[slug]) ? slug : (slug ? null : fallbackSlug);
const item = activeSlug ? PRODUCTS[activeSlug] : null;

let selectedSize = null;
let qty = 1;
let activeImg = 0;

function isSoldOutEverywhere(p) {
  return p.sizes && p.sizes.length > 0 && p.sizes.every(s => p.soldOut.includes(s));
}

function render() {
  if (!item) {
    document.getElementById('pageTitle').textContent = 'Product not found — NEEZY';
    crumb.innerHTML = `<a href="index.html">Home</a> / Not found`;
    root.innerHTML = `
      <div class="notfound">
        <h1>Piece not found</h1>
        <p>That link didn't match anything in the catalog. It may have sold out for good, or the link's outdated.</p>
        <a href="index.html#shop" class="btn">Back to the catalog</a>
      </div>
    `;
    return;
  }

  document.getElementById('pageTitle').textContent = `${item.name} — NEEZY`;
  crumb.innerHTML = `<a href="index.html">Home</a> / <a href="${item.collectionHref}">${item.collection}</a> / ${item.name}`;

  const thumbs = item.images.map((src, i) => `
    <button class="${i === activeImg ? 'active' : ''}" data-idx="${i}" aria-label="View image ${i + 1}">
      <img src="${src}" alt="${item.name}, view ${i + 1}">
    </button>
  `).join('');

  const comingSoon = !!item.comingSoon;
  const soldOutAll = !comingSoon && isSoldOutEverywhere(item);

  const sizeButtons = item.sizes.map(s => {
    const disabled = item.soldOut.includes(s);
    return `<button data-size="${s}" ${disabled ? 'disabled' : ''} class="${selectedSize === s ? 'selected' : ''}">${s}</button>`;
  }).join('');

  let priceHtml;
  if (comingSoon) {
    priceHtml = `<span>Coming Soon</span>`;
  } else if (soldOutAll) {
    priceHtml = `<span>Sold Out</span>`;
  } else {
    priceHtml = `${item.wasPrice ? `<span class="was">${NeezyCart.formatMoney(item.currency, item.wasPrice)}</span>` : ''} ${NeezyCart.formatMoney(item.currency, item.price)}`;
  }

  let actionHtml;
  if (comingSoon) {
    actionHtml = `<button class="btn btn--full" disabled>Coming Soon</button>`;
  } else if (soldOutAll) {
    actionHtml = `<button class="btn btn--full" disabled>Sold Out</button>`;
  } else {
    actionHtml = `
      <button class="btn btn--full" id="addToBag">Add to Bag</button>
      <button class="btn btn--outline" id="wishlistBtn" aria-label="Add to wishlist">\u2661</button>
    `;
  }

  root.innerHTML = `
    <div class="product">
      <div class="gallery">
        <div class="gallery__main">
          ${item.badge ? `<span class="gallery__badge">${item.badge}</span>` : ''}
          <img id="mainImg" src="${item.images[activeImg]}" alt="${item.name}">
        </div>
        ${item.images.length > 1 ? `<div class="gallery__thumbs">${thumbs}</div>` : ''}
      </div>

      <div class="info">
        <p class="info__collection"><a href="${item.collectionHref}">${item.collection}</a></p>
        <h1>${item.name}</h1>
        ${(comingSoon || soldOutAll) ? `<p class="stock-flag">${comingSoon ? 'Coming Soon' : 'Sold Out'}</p>` : ''}
        <p class="info__price">${priceHtml}</p>
        <p class="info__desc">${item.desc}</p>

        ${(item.sizes.length && !comingSoon && !soldOutAll) ? `
        <div class="info__block">
          <div class="info__label"><span>Size</span><a href="#">Size guide</a></div>
          <div class="sizes">${sizeButtons}</div>
        </div>` : ''}

        ${(!comingSoon && !soldOutAll) ? `
        <div class="info__block">
          <div class="info__label"><span>Quantity</span></div>
          <div class="qty">
            <button id="qtyMinus" aria-label="Decrease quantity">\u2013</button>
            <span id="qtyValue">${qty}</span>
            <button id="qtyPlus" aria-label="Increase quantity">+</button>
          </div>
        </div>` : ''}

        <div class="info__actions">${actionHtml}</div>

        <p class="info__note">${comingSoon ? "This piece hasn't dropped yet — check back soon." : 'Numbered piece — once this size sells through, it isn\'t reordered.'}</p>
      </div>
    </div>

    <section class="related">
      <h2 class="related__head">You may also like</h2>
      <div class="related__grid" id="relatedGrid"></div>
    </section>
  `;

  // Thumbnail switching
  root.querySelectorAll('.gallery__thumbs button').forEach(btn => {
    btn.addEventListener('click', () => {
      activeImg = parseInt(btn.dataset.idx, 10);
      render();
    });
  });

  // Size selection
  root.querySelectorAll('.sizes button:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedSize = btn.dataset.size;
      render();
    });
  });

  // Quantity stepper
  document.getElementById('qtyMinus')?.addEventListener('click', () => {
    qty = Math.max(1, qty - 1);
    document.getElementById('qtyValue').textContent = qty;
  });
  document.getElementById('qtyPlus')?.addEventListener('click', () => {
    qty = qty + 1;
    document.getElementById('qtyValue').textContent = qty;
  });

  // Add to bag — real add via the shared cart engine
  document.getElementById('addToBag')?.addEventListener('click', () => {
    if (item.sizes.length && !selectedSize) {
      showToast('Pick a size first');
      return;
    }
    NeezyCart.add(activeSlug, selectedSize, qty);
    showToast(`Added ${item.name}${selectedSize ? ` (${selectedSize})` : ''} \u00d7 ${qty} to your bag`);
  });

  // Related products = everything else in the same collection, else random others
  const related = Object.entries(PRODUCTS)
    .filter(([key, p]) => key !== activeSlug && p.collection === item.collection)
    .slice(0, 4);
  const fill = Object.entries(PRODUCTS)
    .filter(([key]) => key !== activeSlug && !related.find(r => r[0] === key))
    .slice(0, 4 - related.length);
  const finalRelated = [...related, ...fill].slice(0, 4);

  document.getElementById('relatedGrid').innerHTML = finalRelated.map(([key, p]) => `
    <a class="related__card" href="product.html?product=${key}">
      <div class="related__img"><img src="${p.images[0]}" alt="${p.name}"></div>
      <h3>${p.name}</h3>
      <p>${p.price == null ? 'Coming soon' : NeezyCart.formatMoney(p.currency, p.price)}</p>
    </a>
  `).join('');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

render();

/* ============ Nav + misc ============ */
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}
window.addEventListener('beforeunload', () => window.scrollTo(0, 0));

const burgerBtn = document.getElementById('burgerBtn');
const navLinks = document.getElementById('navLinks');
burgerBtn?.addEventListener('click', () => navLinks.classList.toggle('open'));
navLinks?.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', () => navLinks.classList.remove('open'));
});

const yearEl = document.getElementById('year');
if (yearEl) yearEl.textContent = new Date().getFullYear();
</script>
