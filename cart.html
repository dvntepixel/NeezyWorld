<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — NEEZY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

:root{
  --ink:        #0a0a0a;
  --panel:      #1a1815;
  --paper:      #f2f0ec;
  --dim:        #9a9a94;
  --line:       rgba(242,240,236,.14);
  --accent:     #c8402c;

  --font-display: 'Archivo Black', 'Arial Black', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --container: 900px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--font-mono);
  font-size:14px;
  line-height:1.6;
}
img{ display:block; max-width:100%; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; background:none; border:none; color:inherit; }
h1,h2,h3{ font-family:var(--font-display); text-transform:uppercase; line-height:1; }

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-family:var(--font-mono);
  font-weight:700;
  font-size:12px;
  letter-spacing:1.5px;
  padding:16px 30px;
  text-transform:uppercase;
  background:var(--paper);
  color:var(--ink);
  transition:background .2s ease, color .2s ease;
}
.btn:hover{ background:var(--accent); color:var(--paper); }
.btn--outline{ background:transparent; color:var(--paper); border:1px solid var(--paper); }
.btn--outline:hover{ background:var(--paper); color:var(--ink); }
.btn--full{ width:100%; }
.btn[disabled]{ opacity:.4; cursor:not-allowed; }

/* ============ Nav ============ */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px clamp(20px,4vw,56px);
  border-bottom:1px solid var(--line);
}
.nav__logo img{ height:40px; }
.nav__links{ display:flex; align-items:center; gap:26px; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
.nav__links a:hover{ color:var(--dim); }
.nav__icons{ display:flex; align-items:center; gap:18px; }
.nav__icons button, .nav__icons a{ display:flex; position:relative; }
.cart-count{
  position:absolute; top:-7px; right:-9px;
  background:var(--accent); color:var(--paper);
  font-size:9px; font-weight:700;
  min-width:15px; height:15px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  padding:0 3px;
}
.nav__burger{ display:none; flex-direction:column; gap:5px; width:24px; }
.nav__burger span{ height:2px; background:var(--paper); width:100%; }

/* ============ Page ============ */
.page{
  max-width:var(--container);
  margin:0 auto;
  padding:60px 24px 120px;
}
.page__head{ margin-bottom:44px; }
.page__head h1{ font-size:clamp(30px,4.4vw,46px); margin-bottom:10px; }
.page__head p{ color:var(--dim); font-size:13px; }

/* Cart lines */
.lines{ border-top:1px solid var(--line); margin-bottom:40px; }
.line{
  display:grid;
  grid-template-columns:88px 1fr auto auto;
  align-items:center;
  gap:20px;
  padding:22px 0;
  border-bottom:1px solid var(--line);
}
.line__img{
  width:88px; height:110px;
  overflow:hidden;
  background:var(--panel);
  border:1px solid var(--line);
}
.line__img img{ width:100%; height:100%; object-fit:cover; }
.line__info a{ font-weight:700; font-size:14px; }
.line__info a:hover{ color:var(--accent); }
.line__meta{ font-size:12px; color:var(--dim); margin-top:6px; }
.line__price{ font-size:13px; font-weight:700; text-align:right; white-space:nowrap; }

.line__qty{
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line);
}
.line__qty button{ width:34px; height:34px; font-size:14px; }
.line__qty button:hover{ background:var(--panel); }
.line__qty span{ width:32px; text-align:center; font-weight:700; font-size:12px; }

.line__remove{
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--dim);
  text-align:right;
  margin-top:8px;
}
.line__remove:hover{ color:var(--accent); }

/* Summary */
.summary{
  border:1px solid var(--line);
  padding:30px;
}
.summary h2{ font-size:16px; margin-bottom:20px; }
.summary__row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  padding:8px 0;
  color:var(--dim);
}
.summary__row strong{ color:var(--paper); font-weight:700; }
.summary__note{ font-size:11px; color:var(--dim); margin:14px 0 22px; line-height:1.7; }

/* Empty state */
.empty{
  text-align:center;
  padding:100px 24px;
  border:1px dashed var(--line);
}
.empty h2{ font-size:clamp(24px,3.4vw,34px); margin-bottom:14px; }
.empty p{ color:var(--dim); margin-bottom:30px; font-size:13px; }

/* Checkout success */
.success{
  text-align:center;
  padding:100px 24px;
}
.success h2{ font-size:clamp(26px,3.6vw,38px); margin-bottom:16px; }
.success p{ color:var(--dim); margin-bottom:34px; font-size:13px; max-width:420px; margin-left:auto; margin-right:auto; }
.success__id{
  display:inline-block;
  font-size:11px;
  letter-spacing:1px;
  color:var(--accent);
  border:1px solid var(--line);
  padding:8px 16px;
  margin-bottom:34px;
}

/* ============ Footer ============ */
.footer{ border-top:1px solid var(--line); padding:50px clamp(20px,4vw,50px) 30px; }
.footer__bottom{ text-align:center; font-size:10px; letter-spacing:1.5px; color:var(--dim); }

@media (max-width:640px){
  .nav__links{
    position:fixed; top:0; right:0; height:100vh; width:min(78vw,300px);
    background:var(--ink); flex-direction:column; padding:100px 30px; gap:26px;
    transform:translateX(100%); transition:transform .3s ease; z-index:200;
    border-left:1px solid var(--line);
  }
  .nav__links.open{ transform:translateX(0); }
  .nav__burger{ display:flex; }
  .nav__logo img{ height:30px; }
  .line{ grid-template-columns:70px 1fr; }
  .line__price{ grid-column:2; text-align:left; }
}
</style>
</head>

<script>
/* ============================================================
   NEEZY — shared cart engine
   Inlined on every page, right after the product catalog block above,
   so each HTML file stays fully self-contained with no external JS files.

   Storage: sessionStorage — this means the cart is remembered
   as you navigate between pages, but clears automatically when
   the browser tab/window is closed (i.e. "until the session
   stops"). Swap STORAGE below to localStorage if you ever want
   it to persist across visits instead.
   ============================================================ */

(function () {
  const STORAGE = window.sessionStorage;
  const KEY = "neezy_cart_v1";

  function readCart() {
    try {
      const raw = STORAGE.getItem(KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function writeCart(items) {
    try {
      STORAGE.setItem(KEY, JSON.stringify(items));
    } catch (e) { /* storage full or unavailable — fail silently */ }
    updateBadges();
    document.dispatchEvent(new CustomEvent("neezy-cart-updated", { detail: { items } }));
  }

  function findIndex(items, slug, size) {
    return items.findIndex(i => i.slug === slug && i.size === (size || null));
  }

  function add(slug, size, qty) {
    qty = Math.max(1, qty || 1);
    const items = readCart();
    const idx = findIndex(items, slug, size || null);
    if (idx > -1) {
      items[idx].qty += qty;
    } else {
      items.push({ slug: slug, size: size || null, qty: qty });
    }
    writeCart(items);
    return items;
  }

  function removeAt(index) {
    const items = readCart();
    items.splice(index, 1);
    writeCart(items);
    return items;
  }

  function setQtyAt(index, qty) {
    const items = readCart();
    if (!items[index]) return items;
    items[index].qty = Math.max(1, qty || 1);
    writeCart(items);
    return items;
  }

  function clear() {
    writeCart([]);
  }

  function getItems() {
    return readCart();
  }

  function getCount() {
    return readCart().reduce((sum, i) => sum + i.qty, 0);
  }

  // Sum totals grouped by currency, since this catalog mixes MYR and PHP.
  function getSubtotals() {
    const items = readCart();
    const products = window.NEEZY_PRODUCTS || {};
    const totals = {};
    items.forEach(i => {
      const p = products[i.slug];
      if (!p || p.price == null) return;
      totals[p.currency] = (totals[p.currency] || 0) + p.price * i.qty;
    });
    return totals;
  }

  function formatMoney(currency, amount) {
    if (currency === "PHP") return "\u20b1" + Math.round(amount).toLocaleString();
    if (currency === "MYR") return "RM " + amount.toFixed(2);
    return currency + " " + amount.toFixed(2);
  }

  function updateBadges() {
    const count = getCount();
    document.querySelectorAll(".cart-count").forEach(el => {
      el.textContent = count;
      el.style.display = count > 0 ? "" : "none";
    });
  }

  window.NeezyCart = {
    add: add,
    removeAt: removeAt,
    setQtyAt: setQtyAt,
    clear: clear,
    getItems: getItems,
    getCount: getCount,
    getSubtotals: getSubtotals,
    formatMoney: formatMoney,
    updateBadges: updateBadges
  };

  document.addEventListener("DOMContentLoaded", updateBadges);
  // In case this script runs after DOMContentLoaded already fired
  if (document.readyState !== "loading") updateBadges();
})();

</script>
<script>
const root = document.getElementById('cartRoot');
const pageSub = document.getElementById('pageSub');

function render() {
  const items = NeezyCart.getItems();
  const products = window.NEEZY_PRODUCTS || {};

  if (!items.length) {
    pageSub.textContent = "Your bag is empty.";
    root.innerHTML = `
      <div class="empty">
        <h2>Nothing in here yet</h2>
        <p>Pieces you add from the catalog will show up here until you close this browser session.</p>
        <a href="index.html#shop" class="btn">Back to the catalog</a>
      </div>
    `;
    return;
  }

  pageSub.textContent = `${NeezyCart.getCount()} item${NeezyCart.getCount() === 1 ? '' : 's'} in your bag this session.`;

  const lines = items.map((line, idx) => {
    const p = products[line.slug];
    if (!p) return '';
    const price = p.price == null ? 'Coming soon' : NeezyCart.formatMoney(p.currency, p.price * line.qty);
    return `
      <div class="line">
        <a href="product.html?product=${line.slug}" class="line__img">
          <img src="${p.images[0]}" alt="${p.name}">
        </a>
        <div class="line__info">
          <a href="product.html?product=${line.slug}">${p.name}</a>
          <div class="line__meta">${p.collection}${line.size ? ' · Size ' + line.size : ''}</div>
          <div class="line__qty">
            <button data-action="minus" data-idx="${idx}" aria-label="Decrease quantity">\u2013</button>
            <span>${line.qty}</span>
            <button data-action="plus" data-idx="${idx}" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <div>
          <div class="line__price">${price}</div>
          <div class="line__remove" data-action="remove" data-idx="${idx}" role="button">Remove</div>
        </div>
        <div></div>
      </div>
    `;
  }).join('');

  const subtotals = NeezyCart.getSubtotals();
  const subtotalRows = Object.keys(subtotals).map(cur =>
    `<div class="summary__row"><span>Subtotal (${cur})</span><strong>${NeezyCart.formatMoney(cur, subtotals[cur])}</strong></div>`
  ).join('') || `<div class="summary__row"><span>Subtotal</span><strong>\u2014</strong></div>`;

  root.innerHTML = `
    <div class="lines">${lines}</div>
    <div class="summary">
      <h2>Order Summary</h2>
      ${subtotalRows}
      <p class="summary__note">
        Prices shown in their original currency \u2014 this demo doesn't convert between MYR and PHP.
        Shipping and taxes calculated at checkout in a real build.
      </p>
      <a class="btn btn--full" id="checkoutBtn" href="payment.html">Checkout</a>
    </div>
  `;

  root.querySelectorAll('[data-action="minus"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      const current = NeezyCart.getItems()[idx];
      if (current.qty <= 1) {
        NeezyCart.removeAt(idx);
      } else {
        NeezyCart.setQtyAt(idx, current.qty - 1);
      }
      render();
    });
  });
  root.querySelectorAll('[data-action="plus"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      const current = NeezyCart.getItems()[idx];
      NeezyCart.setQtyAt(idx, current.qty + 1);
      render();
    });
  });
  root.querySelectorAll('[data-action="remove"]').forEach(el => {
    el.addEventListener('click', () => {
      NeezyCart.removeAt(parseInt(el.dataset.idx, 10));
      render();
    });
  });
}

render();
document.addEventListener('neezy-cart-updated', render);

if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}
window.addEventListener('beforeunload', () => window.scrollTo(0, 0));

const burgerBtn = document.getElementById('burgerBtn');
const navLinks = document.getElementById('navLinks');
burgerBtn?.addEventListener('click', () => navLinks.classList.toggle('open'));
navLinks?.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', () => navLinks.classList.remove('open'));
});

const yearEl = document.getElementById('year');
if (yearEl) yearEl.textContent = new Date().getFullYear();
</script>
